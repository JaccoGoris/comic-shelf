services:
  postgres:
    image: postgres:16-alpine
    container_name: comic-shelf-db
    environment:
      POSTGRES_USER: comic_shelf
      POSTGRES_PASSWORD: comic_shelf
      POSTGRES_DB: comic_shelf
    ports:
      - "5432:5432"
    volumes:
      - comic_shelf_data:/var/lib/postgresql/data

volumes:
  comic_shelf_data:
